name: Buscar Promoções PromoVisk

on:
  # Roda automaticamente a cada 2 horas
  schedule:
    - cron: "0 */2 * * *"

  # Permite rodar manualmente pelo GitHub (botão Run workflow)
  workflow_dispatch:

jobs:
  buscar-promocoes:
    runs-on: ubuntu-latest

    # Permissão para fazer commit no repositório
    permissions:
      contents: write

    steps:

      # 1. Baixa o código do repositório
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      # 2. Instala o Python
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instala as dependências (só o requests)
      - name: 📦 Instalar dependências
        run: pip install -r scripts/requirements.txt

      # 4. Roda o script de busca
      - name: 🔍 Buscar promoções no Mercado Livre
        env:
          ML_CLIENT_ID:        ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET:    ${{ secrets.ML_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python scripts/buscar_promocoes.py

      # 5. Faz commit do JSON atualizado de volta no repositório
      - name: 💾 Salvar JSON atualizado no repositório
        run: |
          git config user.name  "PromoVisk Bot"
          git config user.email "bot@promovisk.com.br"
          git pull --rebase origin main
          git add data/promocoes.json
          git diff --staged --quiet || git commit -m "🔄 Promoções atualizadas $(date +'%d/%m/%Y %H:%M')"
          git push
